<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Leave Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.topbar{background:#1a1a1a;color:#fff;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.topbar-title{font-size:15px;font-weight:500;letter-spacing:0.3px}
.topbar-sub{font-size:12px;opacity:0.5}
.app{max-width:960px;margin:0 auto;padding:1.5rem 1rem}
.tabs{display:flex;gap:4px;border-bottom:1px solid #e0e0e0;margin-bottom:1.5rem;background:#fff;padding:0 1rem;border-radius:10px 10px 0 0}
.tab{padding:10px 18px;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.15s}
.tab:hover{color:#1a1a1a}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.section{display:none}.section.active{display:block}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem}
@media(max-width:600px){.metric-grid{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr!important}}
.metric{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:1rem;text-align:center}
.metric-label{font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.metric-val{font-size:26px;font-weight:600}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-pending{background:#fff8e6;color:#92600a;border:1px solid #f5d87a}
.badge-approved{background:#edfaf0;color:#1a7a3c;border:1px solid #a8e6be}
.badge-rejected{background:#fdf0f0;color:#a32d2d;border:1px solid #f5b8b8}
.badge-annual{background:#e8f0fe;color:#1a56c4}
.badge-sick{background:#fff0e8;color:#b84a1a}
.badge-emergency{background:#fde8f0;color:#993356}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-weight:500;color:#888;font-size:11px;text-transform:uppercase;letter-spacing:0.4px;border-bottom:1px solid #f0f0f0}
td{padding:11px 12px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.btn{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#333;transition:all 0.15s}
.btn:hover{background:#f5f5f5;border-color:#bbb}
.btn-approve{border-color:#a8e6be;color:#1a7a3c;background:#edfaf0}
.btn-approve:hover{background:#d4f5e2}
.btn-reject{border-color:#f5b8b8;color:#a32d2d;background:#fdf0f0}
.btn-reject:hover{background:#fde0e0}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.btn-primary:hover{background:#333}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:#666;font-weight:500}
input,select,textarea{padding:9px 11px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;transition:border-color 0.15s;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#888}
.avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;background:#e8f0fe;color:#1a56c4;flex-shrink:0}
.emp-row{display:flex;align-items:center;gap:10px}
.progress-bar{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-top:5px;min-width:80px}
.progress-fill{height:100%;border-radius:3px}
.notify-badge{background:#fdf0f0;color:#a32d2d;border-radius:20px;font-size:11px;padding:1px 7px;margin-left:6px;font-weight:500}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:480px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-title{font-size:15px;font-weight:600;margin-bottom:1rem}
.action-row{display:flex;gap:8px;margin-top:1rem;justify-content:flex-end}
.toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:11px 20px;border-radius:10px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;max-width:320px}
.toast.show{opacity:1}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.empty{text-align:center;padding:2.5rem;color:#aaa;font-size:13px}
.role-row{display:flex;justify-content:flex-end;align-items:center;gap:8px;margin-bottom:1rem}
.role-label{font-size:12px;color:#888}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Leave Tracker</div>
    <div class="topbar-sub">Organisation leave management</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span style="font-size:12px;opacity:0.6">View as:</span>
    <select id="roleSwitch" onchange="switchRole(this.value)" style="background:#333;color:#fff;border:1px solid #555;padding:4px 8px;border-radius:6px;font-size:12px">
      <option value="manager">Manager</option>
      <option value="employee">Employee (Priya)</option>
    </select>
  </div>
</div>

<div class="app">
  <div style="background:#fff;border-radius:12px;border:1px solid #e8e8e8;margin-bottom:0">
    <div class="tabs">
      <div class="tab active" onclick="showTab('dashboard')">Dashboard</div>
      <div class="tab" onclick="showTab('requests')" id="tab-requests">Requests <span id="pending-count" class="notify-badge" style="display:none"></span></div>
      <div class="tab" onclick="showTab('employees')" id="tab-employees">Employees</div>
      <div class="tab" onclick="showTab('apply')">Apply for Leave</div>
    </div>
  </div>

  <div style="height:1rem"></div>

  <!-- DASHBOARD -->
  <div id="section-dashboard" class="section active">
    <div class="metric-grid" id="metrics"></div>
    <div class="card">
      <div class="section-header"><span style="font-weight:600;font-size:14px">Recent activity</span></div>
      <div id="activity-log"></div>
    </div>
  </div>

  <!-- REQUESTS -->
  <div id="section-requests" class="section">
    <div class="card">
      <div class="section-header"><span style="font-weight:600;font-size:14px">Pending approvals</span></div>
      <div id="pending-table"></div>
    </div>
    <div class="card">
      <div style="font-weight:600;font-size:14px;margin-bottom:1rem">All requests</div>
      <div id="all-requests-table"></div>
    </div>
  </div>

  <!-- EMPLOYEES -->
  <div id="section-employees" class="section">
    <div class="card">
      <div class="section-header"><span style="font-weight:600;font-size:14px">Leave balances</span></div>
      <div id="employees-table"></div>
    </div>
  </div>

  <!-- APPLY -->
  <div id="section-apply" class="section">
    <div class="card" style="max-width:540px">
      <div style="font-weight:600;font-size:14px;margin-bottom:1.25rem">Submit a leave request</div>
      <div class="form-row">
        <div class="form-group">
          <label>Your name</label>
          <select id="f-employee">
            <option>Priya Nair</option>
            <option>Arjun Menon</option>
            <option>Divya Thomas</option>
            <option>Rahul Pillai</option>
            <option>Sneha Krishnan</option>
          </select>
        </div>
        <div class="form-group">
          <label>Leave type</label>
          <select id="f-type">
            <option value="Annual">Annual Leave</option>
            <option value="Sick">Sick Leave</option>
            <option value="Emergency">Emergency Leave</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>From date</label>
          <input type="date" id="f-from">
        </div>
        <div class="form-group">
          <label>To date</label>
          <input type="date" id="f-to">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Reason</label>
        <textarea id="f-reason" rows="3" placeholder="Brief reason for leave..."></textarea>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div id="days-preview" style="font-size:12px;color:#888"></div>
        <button class="btn btn-primary" onclick="submitLeave()">Submit request</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="action-row" id="modal-actions"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const employees=[
  {name:"Priya Nair",dept:"Engineering",annual:18,sick:10,emergency:3,used:{Annual:4,Sick:1,Emergency:0}},
  {name:"Arjun Menon",dept:"Sales",annual:18,sick:10,emergency:3,used:{Annual:6,Sick:2,Emergency:1}},
  {name:"Divya Thomas",dept:"HR",annual:18,sick:10,emergency:3,used:{Annual:3,Sick:0,Emergency:0}},
  {name:"Rahul Pillai",dept:"Finance",annual:18,sick:10,emergency:3,used:{Annual:8,Sick:3,Emergency:0}},
  {name:"Sneha Krishnan",dept:"Marketing",annual:18,sick:10,emergency:3,used:{Annual:2,Sick:1,Emergency:0}}
];

let requests=[
  {id:1,employee:"Arjun Menon",type:"Annual",from:"2026-04-10",to:"2026-04-12",days:3,reason:"Family trip planned",status:"Pending"},
  {id:2,employee:"Divya Thomas",type:"Sick",from:"2026-04-03",to:"2026-04-03",days:1,reason:"Doctor's visit",status:"Approved"},
  {id:3,employee:"Rahul Pillai",type:"Annual",from:"2026-04-15",to:"2026-04-18",days:4,reason:"Wedding ceremony",status:"Pending"},
  {id:4,employee:"Sneha Krishnan",type:"Emergency",from:"2026-04-02",to:"2026-04-02",days:1,reason:"Family emergency",status:"Approved"},
  {id:5,employee:"Priya Nair",type:"Annual",from:"2026-05-01",to:"2026-05-03",days:3,reason:"Vacation",status:"Rejected"}
];

let currentRole="manager";
let nextId=6;
const colors={"Annual":"badge-annual","Sick":"badge-sick","Emergency":"badge-emergency"};

function initDates(){
  const today=new Date().toISOString().split("T")[0];
  document.getElementById("f-from").value=today;
  document.getElementById("f-to").value=today;
  calcDays();
}

function calcDays(){
  const f=new Date(document.getElementById("f-from").value);
  const t=new Date(document.getElementById("f-to").value);
  if(!isNaN(f)&&!isNaN(t)&&t>=f){
    const d=Math.round((t-f)/(1000*60*60*24))+1;
    document.getElementById("days-preview").textContent=d+" day"+(d>1?"s":"")+" requested";
  } else {
    document.getElementById("days-preview").textContent="";
  }
}

document.getElementById("f-from").addEventListener("change",calcDays);
document.getElementById("f-to").addEventListener("change",calcDays);

function switchRole(r){
  currentRole=r;
  const isEmp=r==="employee";
  document.getElementById("tab-requests").style.display=isEmp?"none":"";
  document.getElementById("tab-employees").style.display=isEmp?"none":"";
  renderAll();
  showTab("dashboard");
}

function showTab(t){
  document.querySelectorAll(".tab").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".section").forEach(el=>el.classList.remove("active"));
  const tabs=["dashboard","requests","employees","apply"];
  const idx=tabs.indexOf(t);
  if(idx>=0) document.querySelectorAll(".tab")[idx].classList.add("active");
  document.getElementById("section-"+t).classList.add("active");
}

function renderAll(){renderMetrics();renderPending();renderAllRequests();renderEmployees();renderActivity();}

function renderMetrics(){
  const pending=requests.filter(r=>r.status==="Pending").length;
  const approved=requests.filter(r=>r.status==="Approved").length;
  const totalDays=requests.filter(r=>r.status==="Approved").reduce((s,r)=>s+r.days,0);
  const m=document.getElementById("metrics");
  if(currentRole==="manager"){
    m.innerHTML=`
      <div class="metric"><div class="metric-label">Pending</div><div class="metric-val" style="color:#92600a">${pending}</div></div>
      <div class="metric"><div class="metric-label">Approved</div><div class="metric-val" style="color:#1a7a3c">${approved}</div></div>
      <div class="metric"><div class="metric-label">Days approved</div><div class="metric-val">${totalDays}</div></div>
      <div class="metric"><div class="metric-label">Employees</div><div class="metric-val">${employees.length}</div></div>`;
  } else {
    const emp=employees[0];
    m.innerHTML=`
      <div class="metric"><div class="metric-label">Annual left</div><div class="metric-val" style="color:#1a56c4">${emp.annual-emp.used.Annual}</div></div>
      <div class="metric"><div class="metric-label">Sick left</div><div class="metric-val" style="color:#1a7a3c">${emp.sick-emp.used.Sick}</div></div>
      <div class="metric"><div class="metric-label">Emergency left</div><div class="metric-val" style="color:#993356">${emp.emergency-emp.used.Emergency}</div></div>
      <div class="metric"><div class="metric-label">My requests</div><div class="metric-val">${requests.filter(r=>r.employee==="Priya Nair").length}</div></div>`;
  }
  const pc=requests.filter(r=>r.status==="Pending").length;
  const pb=document.getElementById("pending-count");
  if(pc>0){pb.textContent=pc;pb.style.display="";}else{pb.style.display="none";}
}

function typeBadge(t){return`<span class="badge ${colors[t]}">${t}</span>`;}
function statusBadge(s){const m={"Pending":"badge-pending","Approved":"badge-approved","Rejected":"badge-rejected"};return`<span class="badge ${m[s]}">${s}</span>`;}
function initials(n){return n.split(" ").map(p=>p[0]).join("").toUpperCase();}

function renderPending(){
  const pending=requests.filter(r=>r.status==="Pending");
  const el=document.getElementById("pending-table");
  if(!pending.length){el.innerHTML=`<div class="empty">No pending requests — all clear!</div>`;return;}
  el.innerHTML=`<table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>Actions</th></tr></thead><tbody>`+
    pending.map(r=>`<tr>
      <td><div class="emp-row"><div class="avatar">${initials(r.employee)}</div>${r.employee}</div></td>
      <td>${typeBadge(r.type)}</td>
      <td style="font-size:12px;color:#888">${r.from} → ${r.to}</td>
      <td>${r.days}</td>
      <td><div style="display:flex;gap:6px">
        <button class="btn btn-approve" onclick="action(${r.id},'Approved')">Approve</button>
        <button class="btn btn-reject" onclick="action(${r.id},'Rejected')">Reject</button>
        <button class="btn" onclick="viewRequest(${r.id})">View</button>
      </div></td>
    </tr>`).join("")+`</tbody></table>`;
}

function renderAllRequests(){
  const list=currentRole==="employee"?requests.filter(r=>r.employee==="Priya Nair"):requests;
  const el=document.getElementById("all-requests-table");
  el.innerHTML=`<table><thead><tr><th>Employee</th><th>Type</th><th>Dates</th><th>Days</th><th>Reason</th><th>Status</th></tr></thead><tbody>`+
    list.map(r=>`<tr>
      <td><div class="emp-row"><div class="avatar">${initials(r.employee)}</div>${r.employee}</div></td>
      <td>${typeBadge(r.type)}</td>
      <td style="font-size:12px;color:#888">${r.from} → ${r.to}</td>
      <td>${r.days}</td>
      <td style="color:#888;font-size:12px">${r.reason}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join("")+`</tbody></table>`;
}

function renderEmployees(){
  const el=document.getElementById("employees-table");
  el.innerHTML=`<table><thead><tr><th>Employee</th><th>Dept</th><th>Annual leave</th><th>Sick leave</th><th>Emergency</th></tr></thead><tbody>`+
    employees.map(e=>`<tr>
      <td><div class="emp-row"><div class="avatar">${initials(e.name)}</div>${e.name}</div></td>
      <td style="color:#888;font-size:12px">${e.dept}</td>
      <td><div style="font-size:12px">${e.annual-e.used.Annual} / ${e.annual} left</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.round((e.annual-e.used.Annual)/e.annual*100)}%;background:#1a56c4"></div></div></td>
      <td><div style="font-size:12px">${e.sick-e.used.Sick} / ${e.sick} left</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.round((e.sick-e.used.Sick)/e.sick*100)}%;background:#1a7a3c"></div></div></td>
      <td><div style="font-size:12px">${e.emergency-e.used.Emergency} / ${e.emergency} left</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${Math.round((e.emergency-e.used.Emergency)/e.emergency*100)}%;background:#993356"></div></div></td>
    </tr>`).join("")+`</tbody></table>`;
}

let activityLog=[
  {msg:"Divya Thomas's sick leave approved",time:"Today, 9:15 AM"},
  {msg:"Sneha Krishnan's emergency leave approved",time:"Today, 8:30 AM"},
  {msg:"Arjun Menon submitted annual leave request",time:"Yesterday, 4:00 PM"},
  {msg:"Rahul Pillai submitted annual leave request",time:"Yesterday, 2:30 PM"}
];

function renderActivity(){
  document.getElementById("activity-log").innerHTML=activityLog.map(a=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5">
      <span style="font-size:13px">${a.msg}</span>
      <span style="font-size:11px;color:#aaa;white-space:nowrap;margin-left:12px">${a.time}</span>
    </div>`).join("");
}

function action(id,status){
  const r=requests.find(x=>x.id===id);
  if(!r)return;
  openModal(`${status==="Approved"?"Approve":"Reject"} leave request`,`
    <div style="font-size:13px;color:#666;margin-bottom:0.75rem;line-height:1.6">
      <strong style="color:#1a1a1a">${r.employee}</strong> — ${r.type} Leave<br>
      ${r.from} to ${r.to} (${r.days} day${r.days>1?"s":""})<br><br>
      <em style="color:#888">"${r.reason}"</em>
    </div>
    <div class="form-group"><label>Add a note (optional)</label><textarea id="action-note" rows="2" placeholder="Note to employee..."></textarea></div>`,
    status==="Approved"
      ?`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-approve" style="padding:8px 18px" onclick="finalAction(${id},'Approved')">Confirm approval</button>`
      :`<button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-reject" style="padding:8px 18px" onclick="finalAction(${id},'Rejected')">Confirm rejection</button>`
  );
}

function finalAction(id,status){
  const r=requests.find(x=>x.id===id);
  if(!r)return;
  r.status=status;
  if(status==="Approved"){
    const emp=employees.find(e=>e.name===r.employee);
    if(emp)emp.used[r.type]=(emp.used[r.type]||0)+r.days;
  }
  activityLog.unshift({msg:`${r.employee}'s ${r.type.toLowerCase()} leave ${status.toLowerCase()}`,time:"Just now"});
  closeModal();
  showToast(`Leave ${status.toLowerCase()} — ${r.employee} has been notified`);
  renderAll();
}

function viewRequest(id){
  const r=requests.find(x=>x.id===id);
  openModal("Leave request details",`
    <table style="width:100%;font-size:13px">
      <tr><td style="color:#888;padding:7px 0;width:40%">Employee</td><td>${r.employee}</td></tr>
      <tr><td style="color:#888;padding:7px 0">Leave type</td><td>${typeBadge(r.type)}</td></tr>
      <tr><td style="color:#888;padding:7px 0">From</td><td>${r.from}</td></tr>
      <tr><td style="color:#888;padding:7px 0">To</td><td>${r.to}</td></tr>
      <tr><td style="color:#888;padding:7px 0">Days</td><td>${r.days}</td></tr>
      <tr><td style="color:#888;padding:7px 0">Reason</td><td>${r.reason}</td></tr>
      <tr><td style="color:#888;padding:7px 0">Status</td><td>${statusBadge(r.status)}</td></tr>
    </table>`,
    r.status==="Pending"
      ?`<button class="btn btn-approve" onclick="closeModal();action(${r.id},'Approved')">Approve</button>
         <button class="btn btn-reject" onclick="closeModal();action(${r.id},'Rejected')">Reject</button>
         <button class="btn" onclick="closeModal()">Close</button>`
      :`<button class="btn btn-primary" onclick="closeModal()">Close</button>`
  );
}

function submitLeave(){
  const emp=document.getElementById("f-employee").value;
  const type=document.getElementById("f-type").value;
  const from=document.getElementById("f-from").value;
  const to=document.getElementById("f-to").value;
  const reason=document.getElementById("f-reason").value.trim();
  if(!from||!to||!reason){showToast("Please fill in all fields");return;}
  const f=new Date(from),t=new Date(to);
  if(t<f){showToast("End date must be after start date");return;}
  const days=Math.round((t-f)/(1000*60*60*24))+1;
  const empObj=employees.find(e=>e.name===emp);
  const bal=empObj?(empObj[type.toLowerCase()]-empObj.used[type]):0;
  if(days>bal){showToast(`Not enough ${type} leave balance (${bal} days left)`);return;}
  requests.push({id:nextId++,employee:emp,type,from,to,days,reason,status:"Pending"});
  activityLog.unshift({msg:`${emp} submitted ${type.toLowerCase()} leave request`,time:"Just now"});
  document.getElementById("f-reason").value="";
  showToast("Request submitted — your manager will be notified");
  renderAll();
  showTab("dashboard");
}

function openModal(title,body,actions){
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-body").innerHTML=body;
  document.getElementById("modal-actions").innerHTML=actions;
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal(){document.getElementById("modal-bg").classList.remove("open");}
document.getElementById("modal-bg").addEventListener("click",function(e){if(e.target===this)closeModal();});

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3200);
}

initDates();
renderAll();
</script>
</body>
